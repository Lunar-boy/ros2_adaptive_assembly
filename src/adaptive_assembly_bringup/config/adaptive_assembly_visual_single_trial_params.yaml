fake_object_pose_node:
  ros__parameters:
    # Repeat promptly while target_sync owns the object so startup ordering
    # cannot leave Gazebo at the SDF pose. Writes stop after ownership changes.
    publish_period_sec: 1.0
    x_min: 0.442
    x_max: 0.442
    y_min: 0.148
    y_max: 0.148
    # target_object is a 0.10 m cylinder and this pose is its model center;
    # z=0.10 visually rests it on the support whose top is about z=0.05.
    z: 0.10
    random_seed: 42
    frame_id: world
    target_frame_id: target_object
    yaw_min: 0.0
    yaw_max: 0.0
    publish_immediately: true

assembly_task_node:
  ros__parameters:
    pre_grasp_height_offset: 0.20
    grasp_height_offset: 0.05
    assembly_height_offset: 0.05
    pre_place_height_offset: 0.20
    place_height_offset: 0.00
    retreat_height_offset: 0.20
    replan_distance_threshold: 0.03
    assembly_pose_mode: fixed_socket
    socket_x: 0.62
    socket_y: -0.18
    socket_z: 0.10
    socket_yaw: 0.0
    socket_frame_id: world
