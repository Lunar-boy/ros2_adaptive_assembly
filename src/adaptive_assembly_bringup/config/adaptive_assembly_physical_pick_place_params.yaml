# Physical Gazebo pick-place profile. The socket fixture in
# adaptive_assembly_physical_workcell.sdf is centered at (0.62, -0.18, 0.0).
fake_object_pose_node:
  ros__parameters:
    publish_period_sec: 5.0
    x_min: 0.442
    x_max: 0.442
    y_min: 0.148
    y_max: 0.148
    z: 0.15
    random_seed: 42
    frame_id: world
    target_frame_id: target_object
    yaw_min: 0.0
    yaw_max: 0.0
    publish_immediately: true

assembly_task_node:
  ros__parameters:
    # Absolute target-center offset: grasp offset plus the 0.20 m approach.
    pre_grasp_height_offset: 0.218
    # assembly_tcp position above the cylinder center needed for hand clearance.
    grasp_height_offset: 0.018
    # Relative displacement above the selected grasp pose.
    lift_height_offset: 0.20
    assembly_height_offset: 0.05
    replan_distance_threshold: 0.03
    pre_place_height_offset: 0.20
    # socket_z is the desired object/TCP center; this is not an insertion claim.
    place_height_offset: 0.0
    retreat_height_offset: 0.20
    assembly_pose_mode: fixed_socket
    socket_x: 0.62
    socket_y: -0.18
    socket_z: 0.10
    socket_yaw: 0.0
    socket_frame_id: world

assembly_sequence_planning_node:
  ros__parameters:
    require_grasp_clearance_validation: true
    grasp_min_disallowed_clearance: 0.005
    grasp_clearance_target_object_id: target_object
    grasp_allowed_contact_links_csv: panda_leftfinger,panda_rightfinger
    grasp_synthetic_finger_open_position: 0.040
    grasp_synthetic_finger_closed_position: 0.000
    grasp_synthetic_finger_step: 0.001

# Simulator-only physical close contract. The nominal zero close is expected
# to abort with GOAL_TOLERANCE_VIOLATED when the 0.035 m-radius target is held.
gripper_action_bridge_node:
  ros__parameters:
    joint_names:
      - panda_finger_joint1
      - panda_finger_joint2
    open_position: 0.04
    close_position: 0.0
    result_timeout_sec: 5.0
    contact_wait_timeout_sec: 1.0
    contact_freshness_timeout_sec: 0.25
    contact_settle_duration_sec: 0.20
    allow_contact_limited_close: true
    expected_target_object: target_object
    contact_status_topic: /grasp_contact_status

gazebo_grasp_contact_status_node:
  ros__parameters:
    target_object_name: target_object
    left_finger_entity_name: panda_leftfinger
    right_finger_entity_name: panda_rightfinger
    contact_stale_timeout_sec: 0.25

physical_pick_place_executor_node:
  ros__parameters:
    open_gripper_before_first_arm_stage: true
    gripper_command_timeout_sec: 5.0
    expected_target_object: target_object
    require_plan_lock: true
    two_phase_planning: true
    grasp_plan_lock_status_topic: /grasp_plan_lock_status
    transport_plan_lock_status_topic: /transport_plan_lock_status
    plan_lock_timeout_sec: 10.0
    payload_operation_timeout_sec: 5.0
